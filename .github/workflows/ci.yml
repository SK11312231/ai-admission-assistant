name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Install, type-check & build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # Install all workspace dependencies
      - name: Install dependencies
        run: npm ci

      # Create a minimal server/.env so dotenv doesn't warn during the build
      - name: Create server/.env
        run: cp .env.example server/.env

      # Build server TypeScript → dist/
      - name: Build server
        run: npm run build --workspace=server

      # Build client (tsc type-check + vite bundle)
      - name: Build client
        run: npm run build --workspace=client
